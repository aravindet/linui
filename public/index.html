<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linui</title>
  <link rel="stylesheet" href="styles.css">
  <!--<style>
    @keyframes pad-pulse {
      0%, 100% { padding-top: 0px; padding-bottom: 0px; }
      50%       { padding-top: 20px; padding-bottom: 20px; }
    }
    details[data-key="1"] {

    }
  </style>-->
  <script type="module" src="scroll-pane.js"></script>
  <script type="module" src="datetime-picker.js"></script>
</head>
<body>

  <scroll-pane></scroll-pane>

  <main>
    <datetime-picker min="2020-01-01" max="2030-12-31"></datetime-picker>
  </main>

  <script type="module">
    const N = 50;
    const ITEM_HEIGHT = 40;
    const BUFFER = 5;

    const scrollPane = document.querySelector('scroll-pane');
    const padTop = document.createElement('div');
    const padBottom = document.createElement('div');
    scrollPane.append(padTop, padBottom);

    let firstIndex = 0;
    let lastIndex = -1;

    function createItem(i) {
      const details = document.createElement('details');
      details.name = 'nav';
      details.dataset.key = String(i);
      details.dataset.index = String(i);
      const summary = document.createElement('summary');
      summary.textContent = `Section ${i + 1}`;
      details.appendChild(summary);
      const count = i === (N - 3) ? 1 : 10;
      for (let j = 1; j <= count; j++) {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.textContent = `Item ${i}.${j}`;
        details.appendChild(item);
      }
      return details;
    }

    function firstItemEl() {
      for (const child of scrollPane.children)
        if (child !== padTop && child !== padBottom) return child;
      return null;
    }

    function lastItemEl() {
      for (let i = scrollPane.children.length - 1; i >= 0; i--) {
        const c = scrollPane.children[i];
        if (c !== padTop && c !== padBottom) return c;
      }
      return null;
    }

    function updatePads() {
      const topH = firstIndex > 0 ? Math.min(firstIndex * ITEM_HEIGHT, 100) : 0;
      const bottomH = lastIndex < N - 1 ? Math.min((N - 1 - lastIndex) * ITEM_HEIGHT, 100) : 0;
      padTop.style.height = `${topH}px`;
      padBottom.style.height = `${bottomH}px`;
    }

    function render() {
      let minVisible = N;
      let maxVisible = -1;
      for (const el of scrollPane.visibleChildren) {
        const idx = parseInt(el.dataset.index, 10);
        if (!Number.isNaN(idx)) {
          minVisible = Math.min(minVisible, idx);
          maxVisible = Math.max(maxVisible, idx);
        }
      }

      if (maxVisible < 0) {
        const initLast = Math.min(N - 1, BUFFER * 2);
        for (let i = 0; i <= initLast; i++) scrollPane.insertBefore(createItem(i), padBottom);
        firstIndex = 0;
        lastIndex = initLast;
        updatePads();
        return;
      }

      const newFirst = Math.max(0, minVisible - BUFFER);
      const newLast = Math.min(N - 1, maxVisible + BUFFER);

      // console.log('render', { firstIndex, lastIndex, minVisible, maxVisible, newFirst, newLast });

      while (lastIndex > newLast)  { lastItemEl().remove();  lastIndex--;  }
      while (firstIndex < newFirst) { firstItemEl().remove(); firstIndex++; }

      for (let i = Math.max(lastIndex + 1, newFirst); i <= newLast; i++)
        scrollPane.insertBefore(createItem(i), padBottom);

      const headAnchor = firstItemEl();
      for (let i = newFirst; i < firstIndex; i++)
        scrollPane.insertBefore(createItem(i), headAnchor);

      firstIndex = newFirst;
      lastIndex = newLast;
      updatePads();
    }

    scrollPane.addEventListener('visibleChildrenChange', render);
    render();
  </script>

</body>
</html>
