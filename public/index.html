<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linui</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="scroll-pane.js"></script>
  <script type="module" src="datetime-picker.js"></script>
</head>
<body>

  <scroll-pane>
    <nav id="nav"></nav>
  </scroll-pane>

  <main>
    <datetime-picker min="2020-01-01" max="2030-12-31"></datetime-picker>
  </main>

  <script>
    const nav = document.getElementById('nav');
    const N = 20;
    for (let i = 1; i <= N; i++) {
      const details = document.createElement('details');
      details.name = 'nav';
      const summary = document.createElement('summary');
      summary.textContent = `Section ${i}`;
      details.appendChild(summary);
      const count = i === (N - 1) ? 1 : 10;
      for (let j = 1; j <= count; j++) {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.textContent = `Item ${i}.${j}`;
        details.appendChild(item);
      }
      nav.appendChild(details);
    }
  </script>

</body>
</html>
